  # ── API FastAPI + RAG ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://192.168.1.128:11434
      - OLLAMA_MODEL=qwen2.5:14b
      - EMBEDDING_MODEL=nomic-embed-text
      - CHROMA_PATH=/app/data/chroma_db
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=64
      - LLM_TEMPERATURE=0.2
      - LLM_CTX_WINDOW=4096
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma_data:/app/data/chroma_db
      # Montaje en modo dev (hot-reload):
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  ollama_data:
    name: rag_ollama_models
  chroma_data:
    name: rag_chroma_db
